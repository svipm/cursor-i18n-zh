name: build

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test
        run: npm test

      - name: Check dictionaries
        run: npm run check

      - name: Package Windows helper
        shell: pwsh
        run: ./scripts/package.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cursor-i18n-zh-windows
          path: dist/cursor-i18n-zh-windows.zip

      - name: Publish GitHub Release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/cursor-i18n-zh-windows.zip
