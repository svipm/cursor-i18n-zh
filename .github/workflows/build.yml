name: build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop-sample/src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Check dictionaries
        run: npm run dict-check

      - name: Package Windows helper
        run: npm run package

      - name: Test desktop workbench
        run: cargo test --locked --manifest-path desktop-sample/src-tauri/Cargo.toml

      - name: Build desktop workbench
        run: cargo build --release --locked --manifest-path desktop-sample/src-tauri/Cargo.toml

      - name: Package desktop workbench
        shell: pwsh
        run: ./scripts/package-desktop.ps1

      - name: Smoke test package
        shell: pwsh
        run: |
          $smoke = Join-Path $env:RUNNER_TEMP 'cursor-i18n-zh-smoke'
          if (Test-Path $smoke) { Remove-Item -LiteralPath $smoke -Recurse -Force }
          Expand-Archive -LiteralPath 'dist/cursor-i18n-zh-windows.zip' -DestinationPath $smoke
          foreach ($launcher in @('Cursor汉化助手.cmd', '一键安装汉化.cmd', '还原默认.cmd')) {
            if (!(Test-Path -LiteralPath (Join-Path $smoke $launcher))) { throw "Missing launcher: $launcher" }
          }
          if (!(Test-Path -LiteralPath (Join-Path $smoke 'LICENSE'))) { throw 'Missing LICENSE' }
          node (Join-Path $smoke 'src\cli.js') --help

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cursor-i18n-zh-windows
          path: dist/cursor-i18n-zh-windows.zip

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: localization-workbench-windows
          path: |
            dist/localization-workbench-v*.exe
            dist/localization-workbench-v*-windows.zip
            dist/SHA256SUMS.txt

  macos:
    runs-on: macos-14
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop-sample/src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Import Apple signing certificate
        if: env.APPLE_CERTIFICATE != ''
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Test Node.js core
        shell: bash
        run: |
          set +e
          for test_file in test/*.test.js; do
            node --test "$test_file" 2>&1 | tee node-test.log
            status=${PIPESTATUS[0]}
            if (( status != 0 )); then
              details=$(tail -n 120 node-test.log | sed 's/%/%25/g; s/\r/%0D/g' | awk 'BEGIN { ORS="%0A" } { print }')
              echo "::error file=$test_file,line=1,title=Node.js tests failed::$details"
              exit "$status"
            fi
          done

      - name: Test Rust core
        shell: bash
        run: |
          set +e
          cargo test --locked --manifest-path desktop-sample/src-tauri/Cargo.toml 2>&1 | tee rust-test.log
          status=${PIPESTATUS[0]}
          if (( status != 0 )); then
            details=$(tail -n 120 rust-test.log | sed 's/%/%25/g; s/\r/%0D/g' | awk 'BEGIN { ORS="%0A" } { print }')
            echo "::error title=Rust tests failed::$details"
            exit "$status"
          fi

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2' --locked

      - name: Build macOS workbench
        run: bash scripts/package-macos.sh

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: localization-workbench-macos
          path: |
            dist/localization-workbench-v*-macos-app.zip
            dist/localization-workbench-v*-macos.dmg
            dist/SHA256SUMS-macos.txt

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, macos]
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify tag matches package version
        shell: pwsh
        run: |
          $version = (Get-Content -LiteralPath 'package.json' -Raw | ConvertFrom-Json).version
          if ('v' + $version -ne '${{ github.ref_name }}') {
            throw "Tag ${{ github.ref_name }} does not match package version $version"
          }

      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: cursor-i18n-zh-windows
          path: dist

      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          name: localization-workbench-windows
          path: dist

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: localization-workbench-macos
          path: dist

      - name: Publish GitHub Release asset
        uses: softprops/action-gh-release@v2
        with:
          body_path: .github/releases/${{ github.ref_name }}.md
          fail_on_unmatched_files: true
          files: |
            dist/cursor-i18n-zh-windows.zip
            dist/localization-workbench-v*.exe
            dist/localization-workbench-v*-windows.zip
            dist/localization-workbench-v*-macos-app.zip
            dist/localization-workbench-v*-macos.dmg
            dist/SHA256SUMS.txt
            dist/SHA256SUMS-macos.txt
